name: "vit_b16_lora"
hf_model_id: "google/vit-base-patch16-224"
pretrained: true
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
# Targets query/value in all 12 ViT-B attention blocks (HuggingFace ViT naming).
# Trainable params: ~0.6M vs 85.8M total — ~145x communication reduction.
lora_target_modules: ["query", "value"]
